name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test ruby-${{ matrix.ruby }} ch-${{ matrix.ch }} on ubuntu
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
        ch: ["24.8", "25.3"]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:${{ matrix.ch }}
        ports:
          - 9000:9000
          - 8123:8123
        options: >-
          --health-cmd "wget --spider -q http://localhost:8123/ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: 9000
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Compile extension
        run: bundle exec rake compile
      - name: Run specs
        run: bundle exec rspec --format progress

  macos-compile:
    name: macos compile (ruby-${{ matrix.ruby }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Install cmake
        run: brew install cmake
      - name: Compile extension
        run: bundle exec rake compile
      # No ClickHouse service on macOS runners — specs would fail on the
      # :clickhouse-tagged examples. We verify the build only.

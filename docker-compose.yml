services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse-native-dev
    ports:
      - "9000:9000"   # native TCP
      - "8123:8123"   # HTTP (for HTTP-gem benchmarks)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    tmpfs:
      - /var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 10
